spring.application.name=cookies

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Dev-only DB console at /h2-console (already permitted in SecurityConfig)
spring.h2.console.enabled=true

# --- Auth ------------------------------------------------------------
# REQUIRED in production: set a long random string via the JWT_SECRET env var.
# The value below is a dev-only fallback so the app still boots locally.
app.jwt.secret=${JWT_SECRET:dev-only-secret-change-me-please-this-is-not-secure-enough-for-prod}
app.jwt.expiration-ms=86400000

# Set to true once served over HTTPS in production (cookie won't be sent over plain HTTP otherwise).
app.cookie.secure=${COOKIE_SECURE:false}

# Bootstrap admin account, created once on first startup if the users table is empty.
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:changeme}

# CORS now allows any origin (see CorsConfig.java) ? no property needed here anymore.
logging.level.org.springframework.security=DEBUG
# --- Email -------------------------------------------------------------
# REQUIRED for the email features (signup confirmations, boost emails, reminders).
# Using Gmail SMTP as an example; swap host/port/protocol for your real provider.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@girlscouts-example.org}

# If MAIL_USERNAME isn't set, EmailService logs emails instead of sending them,
# so the app runs fine in dev without real SMTP credentials.
app.mail.enabled=${MAIL_ENABLED:false}